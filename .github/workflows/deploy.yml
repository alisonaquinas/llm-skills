name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:
  repository_dispatch:
    types: [plugin-updated]

concurrency:
  group: llm-skills-gh-pages
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update catalog.json on plugin-updated dispatch
        if: github.event_name == 'repository_dispatch' && github.event.action == 'plugin-updated'
        run: |
          REPO="${{ github.event.client_payload.repo }}"
          VERSION="${{ github.event.client_payload.version }}"
          PLUGIN_REPO="${REPO##*/}"
          echo "Updating catalog for $PLUGIN_REPO to $VERSION"
          node -e "
            const fs = require('fs');
            const catalog = JSON.parse(fs.readFileSync('catalog.json', 'utf8'));
            const plugin = catalog.plugins.find(p => p.repo === '$PLUGIN_REPO');
            if (plugin) {
              plugin.ref = 'v$VERSION';
              plugin.version = '$VERSION';
              console.log('Updated', plugin.pluginName, 'to', '$VERSION');
            } else {
              console.log('No plugin found for repo $PLUGIN_REPO');
            }
            fs.writeFileSync('catalog.json', JSON.stringify(catalog, null, 2) + '\n');
          "
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add catalog.json
          git diff --staged --quiet || git commit -m "chore(catalog): pin $PLUGIN_REPO to v$VERSION"
          git push

      - name: Build static export
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate marketplace.json files
        run: npm run marketplace:generate -- .claude-plugin/marketplace.json out/marketplace.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate RSS feed
        run: npm run rss:generate -- out/rss.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate marketplace.json
        run: npm run marketplace:validate

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          cname: llm-skills.alisonaquinas.com
