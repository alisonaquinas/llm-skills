name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate marketplace.json files
        run: npm run marketplace:generate -- .claude-plugin/marketplace.json out/marketplace.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate marketplace.json schema
        run: npm run marketplace:validate

      - name: Upload marketplace.json artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-json
          path: |
            .claude-plugin/marketplace.json
            out/marketplace.json
