<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" role="img" aria-label="Terminal showing agent skill commands being loaded">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F46043" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F46043" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="card">
      <rect width="360" height="280" rx="14"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="360" height="280" rx="14" fill="url(#bg)" stroke="#292524" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect width="360" height="36" rx="14" fill="#1c1917" clip-path="url(#card)"/>
  <rect y="22" width="360" height="14" fill="#1c1917"/>
  <rect y="35" width="360" height="1" fill="#292524"/>

  <!-- Traffic-light dots -->
  <circle cx="20" cy="18" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="36" cy="18" r="5" fill="#eab308" opacity="0.7"/>
  <circle cx="52" cy="18" r="5" fill="#22c55e" opacity="0.7"/>

  <!-- Title bar text -->
  <text x="180" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#78716c">claude — ~/my-project</text>

  <!-- Prompt line 1 -->
  <rect x="0" y="50" width="360" height="24" fill="url(#glow)"/>
  <text x="18" y="67" font-family="ui-monospace, monospace" font-size="12.5" fill="#F46043">❯</text>
  <text x="34" y="67" font-family="ui-monospace, monospace" font-size="12.5" fill="#e7e5e4">/tdd</text>

  <!-- Response 1 -->
  <text x="18" y="88" font-family="ui-monospace, monospace" font-size="11.5" fill="#4ade80">✓</text>
  <text x="34" y="88" font-family="ui-monospace, monospace" font-size="11.5" fill="#a8a29e">Skill loaded: </text>
  <text x="121" y="88" font-family="ui-monospace, monospace" font-size="11.5" fill="#fdba74">test-driven-development</text>

  <text x="18" y="105" font-family="ui-monospace, monospace" font-size="11" fill="#57534e">  Write the failing test first. Red → Green → Refactor.</text>

  <!-- Divider -->
  <line x1="18" y1="118" x2="342" y2="118" stroke="#292524" stroke-width="1"/>

  <!-- Prompt line 2 -->
  <text x="18" y="136" font-family="ui-monospace, monospace" font-size="12.5" fill="#F46043">❯</text>
  <text x="34" y="136" font-family="ui-monospace, monospace" font-size="12.5" fill="#e7e5e4">/docker</text>

  <!-- Response 2 -->
  <text x="18" y="157" font-family="ui-monospace, monospace" font-size="11.5" fill="#4ade80">✓</text>
  <text x="34" y="157" font-family="ui-monospace, monospace" font-size="11.5" fill="#a8a29e">Skill loaded: </text>
  <text x="121" y="157" font-family="ui-monospace, monospace" font-size="11.5" fill="#fdba74">llm-ci-dev › docker</text>

  <text x="18" y="174" font-family="ui-monospace, monospace" font-size="11" fill="#57534e">  Dockerfile, Compose, BuildKit, layer-cache guidance.</text>

  <!-- Divider -->
  <line x1="18" y1="187" x2="342" y2="187" stroke="#292524" stroke-width="1"/>

  <!-- Prompt line 3 -->
  <text x="18" y="205" font-family="ui-monospace, monospace" font-size="12.5" fill="#F46043">❯</text>
  <text x="34" y="205" font-family="ui-monospace, monospace" font-size="12.5" fill="#e7e5e4">/commit</text>

  <!-- Response 3 -->
  <text x="18" y="226" font-family="ui-monospace, monospace" font-size="11.5" fill="#4ade80">✓</text>
  <text x="34" y="226" font-family="ui-monospace, monospace" font-size="11.5" fill="#a8a29e">Skill loaded: </text>
  <text x="121" y="226" font-family="ui-monospace, monospace" font-size="11.5" fill="#fdba74">llm-shared-skills › commit</text>

  <text x="18" y="243" font-family="ui-monospace, monospace" font-size="11" fill="#57534e">  Conventional commits, staged diff review, push &amp; PR.</text>

  <!-- Blinking cursor line -->
  <text x="18" y="265" font-family="ui-monospace, monospace" font-size="12.5" fill="#F46043">❯</text>
  <rect x="34" y="253" width="8" height="14" fill="#F46043" opacity="0.7" rx="1"/>
</svg>
